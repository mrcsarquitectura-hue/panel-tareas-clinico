<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d9488">
    <link rel="manifest" href="manifest.json">
    
    <title>Asistente Clínico</title>
    
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class', // ¡AHORA OBEDECE AL BOTÓN MANUAL!
            theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] }, colors: { clinica: { 50: '#f0fdfa', 100: '#ccfbf1', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e' } } } }
        }
    </script>
    <style>
        /* Fondos base y modo oscuro manual */
        body { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); transition: background 0.3s ease; }
        .dark body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        
        .columna-kanban { min-height: 250px; padding-bottom: 5rem; }
        .sortable-ghost { opacity: 0.4; border: 2px dashed #94a3b8; border-radius: 0.75rem; }
        .sortable-drag { cursor: grabbing !important; transform: scale(1.03) rotate(2deg); }
        .oculto { display: none !important; }
        ::-webkit-scrollbar { width: 0px; background: transparent; } 
    </style>
</head>
<body class="text-gray-800 dark:text-gray-100 font-sans antialiased h-screen flex flex-col overflow-hidden pb-16 md:pb-0">

    <header class="bg-gradient-to-r from-clinica-600 to-clinica-400 text-white shadow-lg py-4 px-5 shrink-0 md:mx-2 md:mt-2 md:rounded-2xl relative overflow-hidden z-20">
        <div class="flex justify-between items-center relative z-10">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-xl backdrop-blur-sm"><i class="fa-solid fa-brain text-2xl"></i></div>
                <div>
                    <h1 class="text-xl font-bold tracking-wide leading-tight">Asistente Clínico</h1>
                    <p class="text-clinica-50 text-xs font-medium opacity-90">Gestor de Pendientes</p>
                </div>
            </div>
            
            <div class="flex gap-2 items-center">
                <button onclick="toggleTema()" class="bg-white/20 hover:bg-white/30 p-2.5 rounded-xl transition text-sm shadow-sm flex items-center justify-center w-10 h-10" title="Cambiar Tema">
                    <i id="icono-tema" class="fa-solid fa-moon"></i>
                </button>

                <div class="hidden md:flex gap-2">
                    <button onclick="verHistorial()" class="bg-white/20 hover:bg-white/30 px-4 py-2.5 rounded-xl transition text-sm shadow-sm font-semibold flex items-center gap-2">
                        <i class="fa-solid fa-box-archive"></i> Historial
                    </button>
                    <button onclick="abrirModalNueva()" class="bg-white/20 hover:bg-white/30 px-4 py-2.5 rounded-xl transition text-sm shadow-sm font-semibold flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> Nueva Tarea
                    </button>
                    <button onclick="cargarTareas()" class="bg-white/20 hover:bg-white/30 p-2.5 rounded-xl transition shadow-sm w-10 h-10 flex items-center justify-center" title="Sincronizar">
                        <i class="fa-solid fa-rotate-right"></i>
                    </button>
                </div>
            </div>
        </div>
        <div class="mt-4 relative z-10">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-3 text-gray-400 text-sm"></i>
            <input type="text" id="buscador" onkeyup="filtrarVista()" placeholder="Buscar paciente o detalle..." class="w-full pl-11 pr-4 py-2.5 rounded-xl text-gray-700 dark:text-gray-200 dark:bg-slate-800 bg-white/95 focus:outline-none shadow-inner transition">
        </div>
    </header>

    <div id="cargando" class="flex-1 flex flex-col justify-center items-center z-0">
        <div class="bg-white dark:bg-slate-800 p-4 rounded-full shadow-lg mb-4"><i class="fa-solid fa-spinner fa-spin text-3xl text-clinica-500"></i></div>
    </div>

    <main id="tablero" class="flex-1 overflow-y-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-5 oculto items-start">
        <div class="bg-gray-100/80 dark:bg-slate-800/80 rounded-2xl p-4 border border-gray-200/60 dark:border-slate-700 flex flex-col max-h-full backdrop-blur-sm transition-colors duration-300">
            <h2 class="font-bold text-gray-700 dark:text-gray-300 mb-4 px-1 flex justify-between items-center text-sm uppercase tracking-wider">
                Pendientes <span id="contador-pendiente" class="bg-white dark:bg-slate-700 shadow-sm text-clinica-600 dark:text-clinica-400 text-xs py-1 px-2.5 rounded-full font-bold">0</span>
            </h2>
            <div id="columna-pendiente" class="columna-kanban flex flex-col gap-3.5 overflow-y-auto pr-1"></div>
        </div>
        <div class="bg-gray-100/80 dark:bg-slate-800/80 rounded-2xl p-4 border border-gray-200/60 dark:border-slate-700 flex flex-col max-h-full backdrop-blur-sm transition-colors duration-300">
            <h2 class="font-bold text-gray-700 dark:text-gray-300 mb-4 px-1 flex justify-between items-center text-sm uppercase tracking-wider">
                En Progreso <span id="contador-progreso" class="bg-white dark:bg-slate-700 shadow-sm text-yellow-600 text-xs py-1 px-2.5 rounded-full font-bold">0</span>
            </h2>
            <div id="columna-en-progreso" class="columna-kanban flex flex-col gap-3.5 overflow-y-auto pr-1"></div>
        </div>
        <div class="bg-gray-100/80 dark:bg-slate-800/80 rounded-2xl p-4 border border-gray-200/60 dark:border-slate-700 flex flex-col max-h-full relative backdrop-blur-sm transition-colors duration-300">
            <div class="flex justify-between items-center mb-4 px-1">
                <h2 class="font-bold text-gray-700 dark:text-gray-300 flex items-center text-sm uppercase tracking-wider">
                    Completadas <span id="contador-completado" class="ml-2 bg-white dark:bg-slate-700 shadow-sm text-green-600 dark:text-green-400 text-xs py-1 px-2.5 rounded-full font-bold">0</span>
                </h2>
                <button onclick="archivarCompletadas()" class="text-[11px] font-bold uppercase tracking-wide text-clinica-600 dark:text-clinica-400 bg-clinica-100 dark:bg-slate-700 hover:bg-clinica-200 dark:hover:bg-slate-600 px-3 py-1.5 rounded-lg transition">Limpiar</button>
            </div>
            <div id="columna-completado" class="columna-kanban flex flex-col gap-3.5 overflow-y-auto pr-1"></div>
        </div>
    </main>

    <main id="vista-historial" class="flex-1 overflow-y-auto p-4 oculto bg-white/50 dark:bg-slate-900/50 transition-colors duration-300">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-gray-700 dark:text-gray-200"><i class="fa-solid fa-box-archive mr-2"></i> Tareas Archivadas</h2>
            <button onclick="cerrarHistorial()" class="px-4 py-2 bg-clinica-100 dark:bg-slate-800 text-clinica-600 dark:text-clinica-400 hover:bg-clinica-200 dark:hover:bg-slate-700 font-bold rounded-lg shadow-sm transition">
                <i class="fa-solid fa-arrow-left"></i> Volver
            </button>
        </div>
        <div id="lista-historial" class="flex flex-col gap-3 pb-10"></div>
    </main>

    <nav class="md:hidden fixed bottom-0 w-full bg-white dark:bg-slate-900 border-t border-gray-200 dark:border-slate-800 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-30 pb-safe transition-colors duration-300">
        <div class="flex justify-around items-center p-3">
            <button onclick="cargarTareas()" class="flex flex-col items-center text-gray-500 dark:text-gray-400 hover:text-clinica-500 dark:hover:text-clinica-400 w-16 transition">
                <i class="fa-solid fa-rotate-right text-xl mb-1"></i>
                <span class="text-[10px] font-medium">Actualizar</span>
            </button>
            
            <button onclick="abrirModalNueva()" class="flex flex-col items-center justify-center -mt-8 bg-gradient-to-r from-clinica-500 to-clinica-600 text-white rounded-full w-14 h-14 shadow-lg border-4 border-white dark:border-slate-900 transform active:scale-95 transition">
                <i class="fa-solid fa-plus text-2xl"></i>
            </button>
            
            <button onclick="verHistorial()" class="flex flex-col items-center text-gray-500 dark:text-gray-400 hover:text-clinica-500 dark:hover:text-clinica-400 w-16 transition">
                <i class="fa-solid fa-box-archive text-xl mb-1"></i>
                <span class="text-[10px] font-medium">Historial</span>
            </button>
        </div>
    </nav>

    <div id="modal-nueva" class="fixed inset-0 bg-slate-900/60 z-50 flex justify-center items-end md:items-center oculto backdrop-blur-sm transition-all">
        <div class="bg-white dark:bg-slate-800 rounded-t-3xl md:rounded-2xl shadow-2xl w-full md:w-96 p-6 pb-10 md:pb-6 transition-colors duration-300">
            <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-600 rounded-full mx-auto mb-5 md:hidden"></div>
            <h3 class="text-lg font-bold text-gray-800 dark:text-white mb-5 flex items-center"><div class="bg-clinica-100 dark:bg-clinica-900/30 text-clinica-600 dark:text-clinica-400 p-2 rounded-lg mr-3"><i class="fa-solid fa-plus"></i></div> Nueva Tarea</h3>
            
            <label class="block text-sm font-semibold mb-1.5 text-gray-700 dark:text-gray-300">Descripción</label>
            <div class="relative mb-4">
                <textarea id="add-descripcion" rows="3" class="w-full border-gray-200 dark:border-slate-600 rounded-xl p-3 pr-12 bg-gray-50 dark:bg-slate-700 dark:text-white border focus:ring-2 focus:ring-clinica-400 focus:outline-none transition resize-none" placeholder="Ej: Redactar informe..."></textarea>
                <button onclick="iniciarDictado()" class="absolute right-3 bottom-4 w-8 h-8 bg-clinica-100 dark:bg-slate-600 text-clinica-600 dark:text-clinica-400 rounded-full hover:bg-clinica-200 dark:hover:bg-slate-500 flex items-center justify-center transition">
                    <i class="fa-solid fa-microphone"></i>
                </button>
            </div>
            
            <div class="flex gap-3 mb-6">
                <div class="flex-1">
                    <label class="block text-sm font-semibold mb-1.5 text-gray-700 dark:text-gray-300">Categoría</label>
                    <select id="add-clasificacion" class="w-full border-gray-200 dark:border-slate-600 rounded-xl p-2.5 bg-gray-50 dark:bg-slate-700 dark:text-white border focus:outline-none transition-colors">
                        <option value="Informes">Informes</option>
                        <option value="Fichas">Fichas</option>
                        <option value="Mensaje a Colega">Mensaje</option>
                        <option value="General">General</option>
                    </select>
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-semibold mb-1.5 text-gray-700 dark:text-gray-300">Prioridad</label>
                    <select id="add-prioridad" class="w-full border-gray-200 dark:border-slate-600 rounded-xl p-2.5 bg-gray-50 dark:bg-slate-700 dark:text-white border focus:outline-none transition-colors">
                        <option value="Alta">Alta</option>
                        <option value="Media" selected>Media</option>
                        <option value="Baja">Baja</option>
                    </select>
                </div>
            </div>
            
            <div class="flex justify-end gap-3">
                <button onclick="cerrarModalNueva()" class="px-5 py-3 md:py-2.5 text-gray-600 dark:text-gray-300 font-medium bg-gray-100 dark:bg-slate-700 hover:bg-gray-200 dark:hover:bg-slate-600 rounded-xl w-full md:w-auto transition">Cancelar</button>
                <button onclick="guardarNueva()" class="px-5 py-3 md:py-2.5 bg-gradient-to-r from-clinica-500 to-clinica-600 hover:from-clinica-600 hover:to-clinica-700 text-white font-
