<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Clínico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: { extend: { colors: { clinica: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488' } } } }
        }
    </script>
    <style>
        body { background-color: #f8fafc; }
        .columna-kanban { min-height: 250px; padding-bottom: 2rem; }
        /* Efecto al arrastrar */
        .sortable-ghost { opacity: 0.4; background-color: #f1f5f9; border: 2px dashed #cbd5e1; }
        .sortable-drag { cursor: grabbing !important; }
        .oculto { display: none !important; }
    </style>
</head>
<body class="text-gray-800 font-sans antialiased h-screen flex flex-col overflow-hidden">

    <header class="bg-clinica-500 text-white shadow-md py-3 px-4 shrink-0">
        <div class="flex justify-between items-center mb-3">
            <h1 class="text-xl font-bold"><i class="fa-solid fa-notes-medical mr-2"></i> Gestión Clínica</h1>
            <div class="flex gap-3">
                <button onclick="verHistorial()" class="bg-clinica-600 hover:bg-clinica-700 p-2 rounded-full transition text-sm" title="Historial">
                    <i class="fa-solid fa-box-archive"></i>
                </button>
                <button onclick="cargarTareas()" class="bg-clinica-600 hover:bg-clinica-700 p-2 rounded-full transition text-sm" title="Sincronizar">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
            </div>
        </div>
        
        <div class="flex flex-col md:flex-row gap-3 relative">
            <div class="relative flex-1">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-gray-400"></i>
                <input type="text" id="buscador" onkeyup="filtrarVista()" placeholder="Buscar paciente, tarea o detalle..." class="w-full pl-10 pr-4 py-2 rounded-lg text-gray-700 focus:outline-none focus:ring-2 focus:ring-clinica-100 shadow-sm">
            </div>
            <select id="filtro-categoria" onchange="filtrarVista()" class="py-2 px-4 rounded-lg text-gray-700 shadow-sm focus:outline-none">
                <option value="Todas">Todas las categorías</option>
                <option value="Informes">Informes</option>
                <option value="Fichas">Fichas</option>
                <option value="Mensaje a Colega">Mensajes</option>
            </select>
        </div>
    </header>

    <div id="modal-edicion" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-50 flex justify-center items-center oculto backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-xl w-11/12 md:w-96 p-6 transform transition-all">
            <h3 class="text-lg font-bold text-gray-800 mb-4"><i class="fa-solid fa-pen-to-square mr-2 text-clinica-500"></i>Editar Tarea</h3>
            <input type="hidden" id="edit-id">
            
            <label class="block text-sm font-medium text-gray-700 mb-1">Prioridad</label>
            <select id="edit-prioridad" class="w-full mb-4 border-gray-300 rounded-lg p-2 bg-gray-50 border focus:ring-clinica-500">
                <option value="Alta">Alta</option>
                <option value="Media">Media</option>
                <option value="Baja">Baja</option>
            </select>
            
            <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
            <textarea id="edit-descripcion" rows="4" class="w-full mb-4 border-gray-300 rounded-lg p-2 bg-gray-50 border focus:ring-clinica-500"></textarea>
            
            <div class="flex justify-end gap-3">
                <button onclick="cerrarModal()" class="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded-lg transition">Cancelar</button>
                <button onclick="guardarEdicion()" class="px-4 py-2 bg-clinica-500 hover:bg-clinica-600 text-white rounded-lg transition shadow-sm">Guardar</button>
            </div>
        </div>
    </div>

    <div id="cargando" class="flex-1 flex flex-col justify-center items-center">
        <i class="fa-solid fa-spinner fa-spin text-4xl text-clinica-500"></i>
        <p class="mt-2 text-gray-500 font-medium">Sincronizando espacio de trabajo...</p>
    </div>

    <main id="tablero" class="flex-1 overflow-y-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6 oculto items-start">
        
        <div class="bg-gray-100 rounded-xl shadow-inner p-3 border border-gray-200 flex flex-col max-h-full">
            <h2 class="font-bold text-gray-700 mb-3 px-2 flex justify-between items-center">
                Pendientes <span id="contador-pendiente" class="bg-gray-300 text-gray-700 text-xs py-1 px-2 rounded-full font-bold">0</span>
            </h2>
            <div id="columna-pendiente" class="columna-kanban flex flex-col gap-3 overflow-y-auto pr-1"></div>
        </div>

        <div class="bg-gray-100 rounded-xl shadow-inner p-3 border border-gray-200 flex flex-col max-h-full">
            <h2 class="font-bold text-gray-700 mb-3 px-2 flex justify-between items-center">
                En Progreso <span id="contador-progreso" class="bg-gray-300 text-gray-700 text-xs py-1 px-2 rounded-full font-bold">0</span>
            </h2>
            <div id="columna-en-progreso" class="columna-kanban flex flex-col gap-3 overflow-y-auto pr-1"></div>
        </div>

        <div class="bg-gray-100 rounded-xl shadow-inner p-3 border border-gray-200 flex flex-col max-h-full relative">
            <div class="flex justify-between items-center mb-3 px-2">
                <h2 class="font-bold text-gray-700 flex items-center">
                    Completadas <span id="contador-completado" class="ml-2 bg-gray-300 text-gray-700 text-xs py-1 px-2 rounded-full font-bold">0</span>
                </h2>
                <button onclick="archivarCompletadas()" class="text-xs text-clinica-600 hover:text-clinica-700 bg-clinica-100 px-2 py-1 rounded transition">Limpiar</button>
            </div>
            <div id="columna-completado" class="columna-kanban flex flex-col gap-3 overflow-y-auto pr-1"></div>
        </div>

    </main>

    <script>
        // ==========================================
        // PEGA AQUÍ TU URL LARGA DE APPS SCRIPT
        const API_URL = 'https://script.google.com/macros/s/AKfycbzj36pxcGgSo06e6XJ9jLU7gBtsOxGrguo6T0ttO189h72_Tk0JOMRfXaD3VhaHquCSEg/exec';
        // ==========================================

        let todasLasTareas = [];

        async function cargarTareas() {
            document.getElementById('cargando').classList.remove('oculto');
            document.getElementById('tablero').classList.add('oculto');
            
            try {
                const respuesta = await fetch(API_URL);
                todasLasTareas = await respuesta.json();
                renderizarTareas();
                inicializarDragAndDrop();
            } catch (error) {
                alert("Error de conexión. Revisa tu internet.");
            }
            
            document.getElementById('cargando').classList.add('oculto');
            document.getElementById('tablero').classList.remove('oculto');
        }

        function renderizarTareas() {
            document.getElementById('columna-pendiente').innerHTML = '';
            document.getElementById('columna-en-progreso').innerHTML = '';
            document.getElementById('columna-completado').innerHTML = '';
            
            let contadores = { 'Pendiente': 0, 'En Progreso': 0, 'Completado': 0 };
            
            const textoBusqueda = document.getElementById('buscador').value.toLowerCase();
            const categoriaFiltro = document.getElementById('filtro-categoria').value;

            todasLasTareas.forEach(tarea => {
                if (!tarea.ID || tarea.Estado === 'Archivado') return; 
                
                // Filtros de búsqueda y categoría
                const desc = (tarea['Audio Transcrito'] || '').toLowerCase();
                const cat = tarea.Clasificacion || '';
                
                if (textoBusqueda && !desc.includes(textoBusqueda) && !cat.toLowerCase().includes(textoBusqueda)) return;
                if (categoriaFiltro !== 'Todas' && cat !== categoriaFiltro) return;

                const estadoActual = tarea.Estado ? tarea.Estado.trim() : 'Pendiente';
                contadores[estadoActual] = (contadores[estadoActual] || 0) + 1;

                let colorPrioridad = 'bg-gray-100 text-gray-600';
                let bordePrioridad = 'border-l-4 border-gray-300';
                if (tarea.Prioridad === 'Alta') { colorPrioridad = 'bg-red-100 text-red-700'; bordePrioridad = 'border-l-4 border-red-500'; }
                if (tarea.Prioridad === 'Media') { colorPrioridad = 'bg-yellow-100 text-yellow-700'; bordePrioridad = 'border-l-4 border-yellow-400'; }
                if (tarea.Prioridad === 'Baja') { colorPrioridad = 'bg-green-100 text-green-700'; bordePrioridad = 'border-l-4 border-green-500'; }

                let botonWhatsApp = '';
                if (tarea.Clasificacion === 'Mensaje a Colega' && tarea['Borrador de Mensaje']) {
                    const enlaceWsp = `https://wa.me/?text=${encodeURIComponent(tarea['Borrador de Mensaje'])}`;
                    botonWhatsApp = `
                        <a href="${enlaceWsp}" target="_blank" class="mt-3 block w-full text-center bg-green-50 hover:bg-green-100 text-green-700 border border-green-200 text-sm font-semibold py-1.5 rounded-lg transition">
                            <i class="fa-brands fa-whatsapp mr-1"></i> Enviar Mensaje
                        </a>
                    `;
                }

                // Estructura de la tarjeta
                const safeDesc = (tarea['Audio Transcrito'] || '').replace(/'/g, "\\'"); // Escapar comillas para JS
                const tarjeta = `
                    <div data-id="${tarea.ID}" class="tarjeta-tarea bg-white shadow-sm hover:shadow-md rounded-lg p-3 cursor-grab transition relative ${bordePrioridad}">
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded-md uppercase tracking-wider ${colorPrioridad}">${tarea.Prioridad || 'Normal'}</span>
                            <button onclick="abrirModal('${tarea.ID}', '${safeDesc}', '${tarea.Prioridad}')" class="text-gray-400 hover:text-clinica-500 p-1">
                                <i class="fa-solid fa-ellipsis-vertical"></i>
                            </button>
                        </div>
                        <div class="text-xs text-clinica-600 font-semibold mb-1"><i class="fa-solid fa-tag text-[10px]"></i> ${tarea.Clasificacion || 'General'}</div>
                        <p class="text-sm text-gray-800 leading-snug">${tarea['Audio Transcrito'] || 'Sin descripción'}</p>
                        ${botonWhatsApp}
                    </div>
                `;

                let columnaDestino = document.getElementById('columna-pendiente');
                if (estadoActual === 'En Progreso') columnaDestino = document.getElementById('columna-en-progreso');
                if (estadoActual === 'Completado') columnaDestino = document.getElementById('columna-completado');
                
                columnaDestino.innerHTML += tarjeta;
            });

            document.getElementById('contador-pendiente').innerText = contadores['Pendiente'] || 0;
            document.getElementById('contador-progreso').innerText = contadores['En Progreso'] || 0;
            document.getElementById('contador-completado').innerText = contadores['Completado'] || 0;
        }

        // --- SISTEMA DE ARRASTRE (DRAG & DROP) ---
        function inicializarDragAndDrop() {
            const configuracion = {
                group: 'kanban',
                animation: 200,
                ghostClass: 'sortable-ghost',
                onEnd: function (evt) {
                    const idTarea = evt.item.getAttribute('data-id');
                    let nuevoEstado = 'Pendiente';
                    if (evt.to.id === 'columna-en-progreso') nuevoEstado = 'En Progreso';
                    if (evt.to.id === 'columna-completado') nuevoEstado = 'Completado';
                    
                    // Solo guardar si cambió de columna
                    if (evt.from.id !== evt.to.id) {
                        actualizarDatosBase(idTarea, { estado: nuevoEstado });
                    }
                }
            };
            
            new Sortable(document.getElementById('columna-pendiente'), configuracion);
            new Sortable(document.getElementById('columna-en-progreso'), configuracion);
            new Sortable(document.getElementById('columna-completado'), configuracion);
        }

        // --- LOGICA DEL MODAL DE EDICIÓN ---
        function abrirModal(id, descripcion, prioridad) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-descripcion').value = descripcion;
            document.getElementById('edit-prioridad').value = prioridad || 'Media';
            document.getElementById('modal-edicion').classList.remove('oculto');
        }

        function cerrarModal() {
            document.getElementById('modal-edicion').classList.add('oculto');
        }

        async function guardarEdicion() {
            const id = document.getElementById('edit-id').value;
            const nuevaDesc = document.getElementById('edit-descripcion').value;
            const nuevaPrio = document.getElementById('edit-prioridad').value;
            
            cerrarModal();
            
            // Actualizar interfaz visualmente de inmediato (Optimistic UI)
            const tareaIndex = todasLasTareas.findIndex(t => t.ID === id);
            if (tareaIndex > -1) {
                todasLasTareas[tareaIndex]['Audio Transcrito'] = nuevaDesc;
                todasLasTareas[tareaIndex].Prioridad = nuevaPrio;
                renderizarTareas();
            }

            // Enviar cambio al fondo
            await actualizarDatosBase(id, { descripcion: nuevaDesc, prioridad: nuevaPrio });
        }

        // --- FUNCIONES EXTRA ---
        function filtrarVista() {
            renderizarTareas();
        }

        async function archivarCompletadas() {
            if(!confirm('¿Ocultar todas las tareas completadas?')) return;
            
            const completadas = todasLasTareas.filter(t => t.Estado === 'Completado' && t.ID);
            
            // Actualización visual inmediata
            completadas.forEach(t => t.Estado = 'Archivado');
            renderizarTareas();

            // Sincronización en bloque con la hoja
            for(let tarea of completadas) {
                await actualizarDatosBase(tarea.ID, { estado: 'Archivado' });
            }
        }

        function verHistorial() {
            alert("Esta función cargará la vista de tareas Archivadas. Por ahora, las limpia de la pantalla principal.");
        }

        // --- COMUNICACIÓN CON LA API ---
        async function actualizarDatosBase(id, cambios) {
            // cambios puede ser {estado: '...'}, {prioridad: '...', descripcion: '...'}, etc.
            const payload = { id: id, ...cambios };
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            } catch (error) {
                console.error("Error actualizando la BD", error);
            }
        }

        window.onload = cargarTareas;
    </script>
</body>
</html>
